name: Deploy CV to matlomax.github.io

# Builds the Astro site here (astro-cvitae) and publishes the static output to the
# user-site repo MatLomax/matlomax.github.io, which serves it at the root domain
# https://matlomax.github.io/ via "Deploy from a branch" (gh-pages, /).
#
# Cross-repo push uses an SSH deploy key:
#   - public  key = write-access deploy key on MatLomax/matlomax.github.io
#   - private key = DEPLOY_KEY secret in this repo
on:
  push:
    branches: [main]
  workflow_dispatch:

# The deploy key (not GITHUB_TOKEN) authorizes the cross-repo push, so we only
# need read access to check out this repo.
permissions:
  contents: read

# Avoid overlapping deploys racing to publish to the external repo.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout astro-cvitae
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Quality gates: a failure here blocks the deploy instead of shipping it.
      - name: Lint and format check
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Build site
        run: pnpm build

      - name: Publish to matlomax.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: MatLomax/matlomax.github.io
          publish_dir: ./dist
          publish_branch: gh-pages
          # Keep the deploy branch as a single rolling commit so build artifacts
          # never accumulate in the user-site repo's history.
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy astro-cvitae@${{ github.sha }}"
